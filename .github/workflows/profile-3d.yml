name: GitHub-Profile-3D-Contrib

on:
  schedule:
    # daily at 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Strip empty language pie chart
        run: |
          python3 - <<'PY'
          import glob, re
          MARKER = '<g transform="translate(40, 520)">'
          for f in glob.glob('profile-3d-contrib/*.svg'):
              s = open(f).read()
              i = s.find(MARKER)
              if i < 0:
                  continue
              depth = 0
              end = None
              for m in re.finditer(r'<g\b|</g>', s[i:]):
                  if m.group() == '</g>':
                      depth -= 1
                      if depth == 0:
                          end = i + m.end()
                          break
                  else:
                      depth += 1
              if end:
                  open(f, 'w').write(s[:i] + s[end:])
                  print('stripped pie from', f)
          PY
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: regenerate 3D contribution calendar" || echo "no changes"
          git push
